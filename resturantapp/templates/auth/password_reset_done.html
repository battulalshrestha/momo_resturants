{% extends "base.html" %}
{% block title %} - Reset Email Sent{% endblock %}
{% block content %}
<style>
    .auth-page { min-height: 60vh; display: flex; align-items: center; justify-content: center; padding: 60px 16px; background: #f9f5f0; }
    .auth-card { background: rgba(17,24,39,1); color: white; border-radius: 16px; padding: 2.5rem 2rem; max-width: 420px; width: 100%; box-shadow: 0 20px 40px rgba(0,0,0,0.3); text-align: center; }
    .check-icon { font-size: 3rem; color: #22c55e; margin-bottom: 1rem; }
    .auth-card h2 { margin-bottom: 1rem; }
    .auth-card p { color: #9ca3af; margin-bottom: 1.5rem; }
    .btn-back { display: inline-block; padding: 0.75rem 2rem; background: #f76d37; color: white; border-radius: 8px; text-decoration: none; font-weight: 700; }
</style>
<div class="auth-page">
    <div class="auth-card">
        <div class="check-icon"><i class="fa-solid fa-circle-check"></i></div>
        <h2>Email Sent!</h2>
        <p>We've sent a password reset link to your email address. Please check your inbox (and spam folder) and follow the instructions.</p>
        <a href="{% url 'login' %}" class="btn-back">Back to Login</a>
    </div>
</div>
{% endblock %}
