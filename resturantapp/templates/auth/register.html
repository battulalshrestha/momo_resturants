
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - MOMOS Restaurant</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/alertifyjs@1.14.0/build/alertify.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/alertifyjs@1.14.0/build/css/alertify.min.css">
    <style>
        *, *::before, *::after { box-sizing: border-box; }

        body, html {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            background: linear-gradient(135deg, rgb(62, 9, 100) 0%, rgb(32, 32, 128) 100%);
            font-family: 'Segoe UI', sans-serif;
        }

        .page-wrapper {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 16px;
        }

        .form-container {
            width: 100%;
            max-width: 460px;
            border-radius: 16px;
            background-color: rgba(17, 24, 39, 0.98);
            padding: 2.5rem 2rem;
            color: rgba(243, 244, 246, 1);
            position: relative;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.05);
        }

        .close-btn {
            position: absolute;
            top: 12px;
            right: 16px;
            font-size: 28px;
            color: #9ca3af;
            text-decoration: none;
            line-height: 1;
            transition: color 0.2s;
        }
        .close-btn:hover { color: #f76d37; }

        .brand-link {
            display: block;
            text-align: center;
            font-size: 1.8rem;
            font-weight: 800;
            color: white;
            text-decoration: none;
            margin-bottom: 0.5rem;
            letter-spacing: 2px;
        }
        .brand-link b { color: #f76d37; }

        .title {
            text-align: center;
            font-size: 1.3rem;
            font-weight: 700;
            margin-bottom: 0.25rem;
        }

        .subtitle {
            text-align: center;
            font-size: 0.85rem;
            color: #9ca3af;
            margin-bottom: 1.5rem;
        }

        .row-fields {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0 12px;
        }

        .input-group-custom {
            margin-bottom: 1rem;
        }

        .input-group-custom label {
            display: block;
            color: rgba(156, 163, 175, 1);
            margin-bottom: 6px;
            font-size: 0.875rem;
        }

        .input-group-custom .input-wrap {
            position: relative;
        }

        .input-group-custom input {
            width: 100%;
            border-radius: 8px;
            border: 1px solid rgba(55, 65, 81, 1);
            outline: 0;
            background-color: rgba(31, 41, 55, 1);
            padding: 0.72rem 2.5rem 0.72rem 1rem;
            color: rgba(243, 244, 246, 1);
            font-size: 0.875rem;
            transition: border-color 0.2s;
        }

        .input-group-custom input:focus {
            border-color: rgba(167, 139, 250, 0.8);
            box-shadow: 0 0 0 3px rgba(167, 139, 250, 0.15);
        }

        .input-icon {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: #6b7280;
        }

        .sign-btn {
            display: block;
            width: 100%;
            background-color: #f76d37;
            padding: 0.8rem;
            text-align: center;
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            letter-spacing: 1px;
            margin-top: 0.5rem;
        }
        .sign-btn:hover { background-color: #e55a24; transform: translateY(-1px); }
        .sign-btn:active { transform: translateY(0); }

        .divider {
            display: flex;
            align-items: center;
            padding: 1.25rem 0 1rem;
            color: #6b7280;
            font-size: 0.8rem;
        }
        .divider::before, .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: rgba(55, 65, 81, 1);
        }
        .divider span { padding: 0 0.75rem; }

        .social-icons {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-bottom: 1.25rem;
        }

        .social-icons .icon {
            border-radius: 8px;
            padding: 10px 14px;
            border: 1px solid rgba(55, 65, 81, 1);
            background-color: rgba(31, 41, 55, 1);
            cursor: pointer;
            transition: border-color 0.2s, background 0.2s;
        }
        .social-icons .icon:hover {
            border-color: rgba(167, 139, 250, 0.6);
            background-color: rgba(55, 65, 81, 0.5);
        }
        .social-icons .icon svg {
            height: 1.25rem;
            width: 1.25rem;
            fill: #fff;
            display: block;
        }

        .login-text {
            text-align: center;
            font-size: 0.8rem;
            color: rgba(156, 163, 175, 1);
        }

        .login-text a {
            color: rgba(167, 139, 250, 1);
            text-decoration: none;
            font-weight: 600;
        }
        .login-text a:hover { text-decoration: underline; }

        .password-strength {
            height: 4px;
            border-radius: 2px;
            margin-top: 6px;
            background: #374151;
            transition: all 0.3s;
        }
        .strength-bar { height: 100%; border-radius: 2px; transition: width 0.3s, background 0.3s; }
    </style>
</head>
<body>
    <div class="page-wrapper">
        <div class="form-container">
            <a href="{% url 'index' %}" class="close-btn" title="Back to Home">
                <i class="fa-solid fa-xmark"></i>
            </a>

            <a href="{% url 'index' %}" class="brand-link"><b>M</b>OMOS</a>
            <h1 class="title">Create Account</h1>
            <p class="subtitle">Join us for a delicious experience</p>

            <form method="POST" action="{% url 'register' %}">
                {% csrf_token %}

                <div class="row-fields">
                    <div class="input-group-custom">
                        <label for="first_name">First Name</label>
                        <div class="input-wrap">
                            <input type="text" name="first_name" id="first_name"
                                placeholder="First" required
                                value="{{ request.POST.first_name|default:'' }}">
                        </div>
                    </div>
                    <div class="input-group-custom">
                        <label for="last_name">Last Name</label>
                        <div class="input-wrap">
                            <input type="text" name="last_name" id="last_name"
                                placeholder="Last" required
                                value="{{ request.POST.last_name|default:'' }}">
                        </div>
                    </div>
                </div>

                <div class="input-group-custom">
                    <label for="username">Username</label>
                    <div class="input-wrap">
                        <input type="text" name="username" id="username"
                            placeholder="Choose a username" required
                            value="{{ request.POST.username|default:'' }}">
                        <span class="input-icon"><i class="fa-solid fa-at"></i></span>
                    </div>
                </div>

                <div class="input-group-custom">
                    <label for="email">Email Address</label>
                    <div class="input-wrap">
                        <input type="email" name="email" id="email"
                            placeholder="you@example.com" required
                            value="{{ request.POST.email|default:'' }}">
                        <span class="input-icon"><i class="fa-solid fa-envelope"></i></span>
                    </div>
                </div>

                <div class="input-group-custom">
                    <label for="password">Password</label>
                    <div class="input-wrap">
                        <input type="password" name="password" id="password"
                            placeholder="Create a strong password" required
                            oninput="checkStrength(this.value)">
                        <span class="input-icon" onclick="togglePass('password', 'eye1')" style="cursor:pointer">
                            <i class="fa-solid fa-eye" id="eye1"></i>
                        </span>
                    </div>
                    <div class="password-strength">
                        <div class="strength-bar" id="strength-bar" style="width:0%"></div>
                    </div>
                </div>

                <div class="input-group-custom">
                    <label for="password1">Confirm Password</label>
                    <div class="input-wrap">
                        <input type="password" name="password1" id="password1"
                            placeholder="Re-enter your password" required>
                        <span class="input-icon" onclick="togglePass('password1', 'eye2')" style="cursor:pointer">
                            <i class="fa-solid fa-eye" id="eye2"></i>
                        </span>
                    </div>
                </div>

                <button type="submit" class="sign-btn">CREATE ACCOUNT</button>
            </form>

            <div class="divider"><span>or sign up with</span></div>

            <div class="social-icons">
                <button aria-label="Sign up with Google" class="icon" title="Google">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
                        <path d="M16.318 13.714v5.484h9.078c-0.37 2.354-2.745 6.901-9.078 6.901-5.458 0-9.917-4.521-9.917-10.099s4.458-10.099 9.917-10.099c3.109 0 5.193 1.318 6.38 2.464l4.339-4.182c-2.786-2.599-6.396-4.182-10.719-4.182-8.844 0-16 7.151-16 16s7.156 16 16 16c9.234 0 15.365-6.49 15.365-15.635 0-1.052-0.115-1.854-0.255-2.651z"></path>
                    </svg>
                </button>
                <button aria-label="Sign up with GitHub" class="icon" title="GitHub">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
                        <path d="M16 0.396c-8.839 0-16 7.167-16 16 0 7.073 4.584 13.068 10.937 15.183 0.803 0.151 1.093-0.344 1.093-0.772 0-0.38-0.009-1.385-0.015-2.719-4.453 0.964-5.391-2.151-5.391-2.151-0.729-1.844-1.781-2.339-1.781-2.339-1.448-0.989 0.115-0.968 0.115-0.968 1.604 0.109 2.448 1.645 2.448 1.645 1.427 2.448 3.744 1.74 4.661 1.328 0.14-1.031 0.557-1.74 1.011-2.135-3.552-0.401-7.287-1.776-7.287-7.907 0-1.751 0.62-3.177 1.645-4.297-0.177-0.401-0.719-2.031 0.141-4.235 0 0 1.339-0.427 4.4 1.641 1.281-0.355 2.641-0.532 4-0.541 1.36 0.009 2.719 0.187 4 0.541 3.043-2.068 4.381-1.641 4.381-1.641 0.859 2.204 0.317 3.833 0.161 4.235 1.015 1.12 1.635 2.547 1.635 4.297 0 6.145-3.74 7.5-7.296 7.891 0.556 0.479 1.077 1.464 1.077 2.959 0 2.14-0.020 3.864-0.020 4.385 0 0.416 0.28 0.916 1.104 0.755 6.4-2.093 10.979-8.093 10.979-15.156 0-8.833-7.161-16-16-16z"></path>
                    </svg>
                </button>
            </div>

            <p class="login-text">
                Already have an account?
                <a href="{% url 'login' %}">Sign in here</a>
            </p>
        </div>
    </div>

    {% for message in messages %}
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            alertify.set('notifier', 'position', 'top-right');
            {% if message.tags == 'error' %}
                alertify.error('{{ message|escapejs }}');
            {% else %}
                alertify.success('{{ message|escapejs }}');
            {% endif %}
        });
    </script>
    {% endfor %}

    <script>
        function togglePass(fieldId, iconId) {
            const field = document.getElementById(fieldId);
            const icon = document.getElementById(iconId);
            if (field.type === 'password') {
                field.type = 'text';
                icon.classList.replace('fa-eye', 'fa-eye-slash');
            } else {
                field.type = 'password';
                icon.classList.replace('fa-eye-slash', 'fa-eye');
            }
        }

        function checkStrength(password) {
            const bar = document.getElementById('strength-bar');
            let strength = 0;
            if (password.length >= 8) strength++;
            if (/[A-Z]/.test(password)) strength++;
            if (/[0-9]/.test(password)) strength++;
            if (/[^A-Za-z0-9]/.test(password)) strength++;

            const colors = ['#ef4444', '#f97316', '#eab308', '#22c55e'];
            const widths = ['25%', '50%', '75%', '100%'];
            if (strength > 0) {
                bar.style.width = widths[strength - 1];
                bar.style.background = colors[strength - 1];
            } else {
                bar.style.width = '0%';
            }
        }
    </script>
</body>
</html>
