{% extends "base.html" %}
{% block title %} - Password Reset{% endblock %}
{% block content %}
<style>
    .auth-page { min-height: 60vh; display: flex; align-items: center; justify-content: center; padding: 60px 16px; background: #f9f5f0; }
    .auth-card { background: rgba(17,24,39,1); color: white; border-radius: 16px; padding: 2.5rem 2rem; max-width: 420px; width: 100%; box-shadow: 0 20px 40px rgba(0,0,0,0.3); }
    .auth-card h2 { text-align: center; margin-bottom: 0.5rem; }
    .auth-card p { text-align: center; color: #9ca3af; font-size: 0.9rem; margin-bottom: 1.5rem; }
    .auth-card label { color: #9ca3af; font-size: 0.875rem; display: block; margin-bottom: 6px; }
    .auth-card input[type=email] { width: 100%; padding: 0.75rem 1rem; background: rgba(31,41,55,1); border: 1px solid rgba(55,65,81,1); border-radius: 8px; color: white; outline: none; margin-bottom: 1rem; }
    .auth-card input[type=email]:focus { border-color: rgba(167,139,250,0.8); }
    .auth-card input[type=submit] { width: 100%; padding: 0.8rem; background: #f76d37; color: white; border: none; border-radius: 8px; font-weight: 700; cursor: pointer; font-size: 1rem; letter-spacing: 1px; }
    .auth-card input[type=submit]:hover { background: #e55a24; }
    .back-link { text-align: center; margin-top: 1rem; font-size: 0.85rem; color: #9ca3af; }
    .back-link a { color: rgba(167,139,250,1); text-decoration: none; }
</style>

<div class="auth-page">
    <div class="auth-card">
        <h2>Reset Password</h2>
        <p>Enter your email address and we'll send you a link to reset your password.</p>
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <input type="submit" value="Send Reset Link">
        </form>
        <div class="back-link">
            <a href="{% url 'login' %}">← Back to Login</a>
        </div>
    </div>
</div>
{% endblock %}
